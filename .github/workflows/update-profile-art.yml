name: Update profile contribution graph
# Fetches contribution data (including private contributions) via GitHub's
# GraphQL API using a PAT, then re-renders the heatmap SVG daily.
# Requires a repository secret named GH_PAT with `read:user` scope.
# Falls back to the default GITHUB_TOKEN if GH_PAT is not set (public only).

on:
  schedule:
    - cron: "17 3 * * *"   # ~03:17 UTC daily (off the hour to dodge Actions load spikes)
  workflow_dispatch: {}     # allows manual "Run workflow" trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Gnanesh-12-profile
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install scraper/render deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit changes if any
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Gnanesh-12-profile/data/contributions.json Gnanesh-12-profile/contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph"
          git push
